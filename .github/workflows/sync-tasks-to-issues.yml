# Sync tasks from docs/tasks/ to GitHub Issues
# Powered by 5DayDocs: https://github.com/jnun/5daydocs
#
# Thin caller wrapper — triggers on push/dispatch and delegates to the reusable
# workflow (sync-tasks-reusable.yml) where all sync logic lives. The two files
# are separate because GitHub requires workflow_call and push/dispatch triggers
# to be in different files. This split also lets user projects call the reusable
# workflow remotely and get updates for free.

name: Sync Tasks to Issues

on:
  push:
    paths:
      - 'docs/tasks/**/*.md'
      - 'docs/5day/DOC_STATE.md'
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_sync_all:
        description: 'Force sync all tasks'
        type: boolean
        default: false

jobs:
  sync:
    permissions:
      issues: write
      contents: write
    uses: jnun/5daydocs/.github/workflows/sync-tasks-reusable.yml@main
    with:
      force_sync_all: ${{ github.event.inputs.force_sync_all == 'true' }}
      # Optional: customize paths (defaults shown)
      # tasks_path: 'docs/tasks'
      # state_file: 'docs/5day/DOC_STATE.md'
      # Optional: GitHub Projects integration
      # project_number: '1'
      # project_owner: 'your-username-or-org'
    secrets: inherit
